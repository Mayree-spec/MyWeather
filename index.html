<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather4u</title>
    <link rel="stylesheet " href="stylesheet.css">
</head>



<body>
    <div class="card">
        <div class="weather-search">
            <input class="searchInput" type="text" placeholder="Input City Name" spellcheck="false">
            <button><img src="myimages/inspire-studio-search-6380865_1920.png" class="searchButton" ></button>
        </div>



        <div class="weather-details">
            <div class="main-img">
                <img src="myimages/sun.png" width="200px" >
            </div>
            <div class="info">
                <h1 class="temp">22°C</h1>
                <h2 class="city">Nigeria</h2>
            </div>
        </div>



        <div class="information">
                <div class="humidity">
                    <img src="myimages/humidity.png" width="100px">
                </div>
                <div class="words">
                    <p class="humidity-percent"> 50%</p>
                    <p class="desc">Humidity</p>
                </div>


                <div class="windspeed">
                    <img src="myimages/wind.png" width="100px">
                </div>
                <div class="words">
                    <p class="wind-percent"> 50%</p>
                    <p class="desc">wind</p>
                </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
